name: UI Automation Pipeline

on:
  push:
    branches: ["main","develop"]

  pull_request:
    branches: ["main"]

jobs:

  ui-tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [smoke, sanity, regression]
        browser: [chrome]

    name: ${{ matrix.profile }}-${{ matrix.browser }}

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Install stable Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # Run tests (compile + test together)
      - name: Run Selenium Tests
        run: |
          mvn -B clean test \
          -P${{ matrix.profile }} \
          -Dbrowser=${{ matrix.browser }}

      # Upload Surefire results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.profile }}
          path: target/surefire-reports

      # Upload screenshots and logs
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.profile }}
          path: |
            test-results/**
            logs/**
            screenshots/**