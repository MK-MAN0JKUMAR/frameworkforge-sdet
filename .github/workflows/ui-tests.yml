name: UI Automation Pipeline

on:
  push:
    branches: ["main","develop"]

  pull_request:
    branches: ["main"]

jobs:

  ui-tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [smoke, sanity, regression]
        browser: [chrome]

    name: ${{ matrix.profile }}-${{ matrix.browser }}

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Install Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # Build project
      - name: Build
        run: mvn -B clean compile -DskipTests

      # Run Selenium tests
      - name: Run UI Tests
        run: |
          mvn clean test \
          -P${{ matrix.profile }} \
          -Dbrowser=${{ matrix.browser }}

      # Upload Test Results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.profile }}
          path: target/surefire-reports

      # Upload logs/screenshots
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.profile }}
          path: |
            logs/**
            screenshots/**